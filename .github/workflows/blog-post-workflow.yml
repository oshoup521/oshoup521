name: Latest Blog Posts

on:
  schedule:
    - cron: "0 */6 * * *"   # Runs every 6 hours
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README with Latest Blog Posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in Blog Posts
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://fearfreecode.wordpress.com/feed"
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: BLOG-POST-LIST
          template: >-
            <a href="$url">
              <img src="https://img.shields.io/badge/$newline_title-0075ca?style=for-the-badge&logo=google-chrome&logoColor=white" alt="$title"/>
            </a>&nbsp;
